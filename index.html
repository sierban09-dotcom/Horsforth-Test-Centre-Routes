<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Driving Test Route Simulator</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

#map {
    height: 100vh;
    width: 100%;
}

.panel {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 999;
    background: white;
    padding: 12px;
    border-radius: 10px;
    width: 240px;
    box-shadow: 0 0 10px rgba(0,0,0,0.2);
}

button, select {
    width: 100%;
    margin-top: 6px;
    padding: 8px;
}

#stats {
    margin-top: 10px;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="panel">
    <select id="routeSelect">
        <option value="route1">Horsforth Practice Route 1</option>
        <option value="route2">Horsforth Practice Route 2</option>
    </select>

    <button onclick="loadRoute()">Load Route (Road Snapped)</button>
    <button onclick="startTracking()">Start GPS</button>
    <button onclick="clearAll()">Clear</button>

    <div id="stats">
        Speed: 0 mph<br>
        Distance: 0 km
    </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// ================= MAP =================

const map = L.map('map').setView([53.842, -1.637], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
}).addTo(map);

// ================= ROUTE START/END POINTS =================
// (These are approximate Horsforth test area anchors)

const routePoints = {
    route1: [
        [53.8432, -1.6381],
        [53.8375, -1.6350]
    ],
    route2: [
        [53.8420, -1.6370],
        [53.8368, -1.6405]
    ]
};

// ================= STATE =================

let routeLine;
let userMarker;
let watchId;
let lastPosition = null;

// ================= USER ICON =================

const userIcon = L.icon({
    iconUrl: "https://cdn-icons-png.flaticon.com/512/64/64113.png",
    iconSize: [35, 35],
    iconAnchor: [17, 17]
});

// ================= LOAD ROUTE (OSRM SNAP TO ROADS) =================

async function loadRoute() {

    const selected = document.getElementById("routeSelect").value;
    const points = routePoints[selected];

    const url =
        `https://router.project-osrm.org/route/v1/driving/` +
        `${points[0][1]},${points[0][0]};${points[1][1]},${points[1][0]}?overview=full&geometries=geojson`;

    const res = await fetch(url);
    const data = await res.json();

    const coords = data.routes[0].geometry.coordinates;

    const latlngs = coords.map(c => [c[1], c[0]]);

    if (routeLine) map.removeLayer(routeLine);

    routeLine = L.polyline(latlngs, {
        color: "blue",
        weight: 5
    }).addTo(map);

    map.fitBounds(routeLine.getBounds());
}

// ================= GPS TRACKING =================

function startTracking() {

    if (!navigator.geolocation) {
        alert("Geolocation not supported");
        return;
    }

    watchId = navigator.geolocation.watchPosition(pos => {

        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;

        const speed = pos.coords.speed ? pos.coords.speed * 2.237 : 0; // m/s → mph

        document.getElementById("stats").innerHTML =
            `Speed: ${speed.toFixed(1)} mph<br>` +
            `Distance: calculating...`;

        const latlng = [lat, lng];

        if (!userMarker) {
            userMarker = L.marker(latlng, { icon: userIcon }).addTo(map);
        } else {
            userMarker.setLatLng(latlng);
        }

        map.panTo(latlng, { animate: true });

        lastPosition = latlng;

    }, err => {
        alert("GPS error: " + err.message);
    }, {
        enableHighAccuracy: true,
        maximumAge: 1000
    });
}

// ================= CLEAR =================

function clearAll() {

    if (routeLine) {
        map.removeLayer(routeLine);
        routeLine = null;
    }

    if (userMarker) {
        map.removeLayer(userMarker);
        userMarker = null;
    }

    if (watchId) {
        navigator.geolocation.clearWatch(watchId);
        watchId = null;
    }

    lastPosition = null;

    document.getElementById("stats").innerHTML =
        "Speed: 0 mph<br>Distance: 0 km";
}

</script>

</body>
</html>
