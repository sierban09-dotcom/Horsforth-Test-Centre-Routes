<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Driving Test Route Simulator</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

#map {
    height: 100vh;
    width: 100%;
}

/* CONTROL PANEL */
.panel {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 999;
    background: white;
    padding: 12px;
    border-radius: 12px;
    width: 260px;
    box-shadow: 0 0 15px rgba(0,0,0,0.2);
}

button, select {
    width: 100%;
    margin-top: 8px;
    padding: 10px;
    font-size: 14px;
    cursor: pointer;
}

/* MOBILE OPTIMISATION */
@media (max-width: 768px) {
    .panel {
        width: 90%;
        left: 5%;
        font-size: 14px;
    }

    button {
        padding: 14px;
        font-size: 16px;
    }
}

/* STATS */
#stats {
    margin-top: 10px;
    font-size: 14px;
    line-height: 1.5;
}
</style>
</head>

<body>

<div class="panel">
    <select id="routeSelect">
        <option value="route1">Horsforth Route 1</option>
        <option value="route2">Horsforth Route 2</option>
        <option value="route3">Horsforth Route 3</option>
    </select>

    <button onclick="loadRoute()">Load Route</button>
    <button onclick="startTracking()">Start GPS</button>
    <button onclick="clearAll()">Clear</button>

    <div id="stats">
        Speed: 0 mph<br>
        Distance: 0 m
    </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// ================= MAP =================

const map = L.map('map').setView([53.842, -1.637], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
}).addTo(map);

// ================= ROUTES =================

const routes = {
    route1: [
        [53.8432, -1.6381],
        [53.8420, -1.6355],
        [53.8408, -1.6330],
        [53.8395, -1.6310],
        [53.8380, -1.6335],
        [53.8390, -1.6370],
        [53.8410, -1.6395],
        [53.8432, -1.6381]
    ],
    route2: [
        [53.8420, -1.6370],
        [53.8400, -1.6390],
        [53.8385, -1.6410],
        [53.8370, -1.6390],
        [53.8365, -1.6365],
        [53.8380, -1.6340],
        [53.8405, -1.6325],
        [53.8420, -1.6370]
    ],
    route3: [
        [53.8415, -1.6375],
        [53.8402, -1.6388],
        [53.8388, -1.6400],
        [53.8375, -1.6380],
        [53.8370, -1.6355],
        [53.8385, -1.6335],
        [53.8405, -1.6328],
        [53.8415, -1.6375]
    ]
};

// ================= STATE =================

let routeLine = null;
let userMarker = null;
let watchId = null;
let lastPosition = null;

let totalDistance = 0;

// ================= ICON (ARROW) =================

const userIcon = L.icon({
    iconUrl: "https://cdn-icons-png.flaticon.com/512/32/32195.png",
    iconSize: [35, 35],
    iconAnchor: [17, 17]
});

// ================= ROUTE LOADING =================

function loadRoute() {

    const selected = document.getElementById("routeSelect").value;
    const route = routes[selected];

    if (routeLine) {
        map.removeLayer(routeLine);
    }

    routeLine = L.polyline(route, {
        color: "blue",
        weight: 5
    }).addTo(map);

    // smooth Google Maps-style zoom
    map.flyToBounds(routeLine.getBounds(), {
        padding: [50, 50],
        duration: 1.5
    });
}

// ================= GPS TRACKING =================

function startTracking() {

    if (!navigator.geolocation) {
        alert("GPS not supported");
        return;
    }

    watchId = navigator.geolocation.watchPosition(pos => {

        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;

        const speed = pos.coords.speed ? pos.coords.speed * 2.237 : 0;

        // distance calculation
        if (lastPosition) {
            totalDistance += getDistance(lastPosition, [lat, lng]);
        }

        lastPosition = [lat, lng];

        // update UI
        document.getElementById("stats").innerHTML =
            `Speed: ${speed.toFixed(1)} mph<br>` +
            `Distance: ${totalDistance.toFixed(0)} m`;

        // marker
        if (!userMarker) {
            userMarker = L.marker([lat, lng], {
                icon: userIcon
            }).addTo(map);
        } else {
            userMarker.setLatLng([lat, lng]);
        }

        // smooth follow
        map.panTo([lat, lng], {
            animate: true,
            duration: 0.5
        });

    }, err => {
        alert("GPS error: " + err.message);
    }, {
        enableHighAccuracy: true,
        maximumAge: 1000,
        timeout: 5000
    });
}

// ================= DISTANCE FUNCTION =================

function getDistance(a, b) {
    const R = 6371000;
    const toRad = x => x * Math.PI / 180;

    const dLat = toRad(b[0] - a[0]);
    const dLng = toRad(b[1] - a[1]);

    const lat1 = toRad(a[0]);
    const lat2 = toRad(b[0]);

    const x =
        Math.sin(dLat/2) * Math.sin(dLat/2) +
        Math.cos(lat1) * Math.cos(lat2) *
        Math.sin(dLng/2) * Math.sin(dLng/2);

    const c = 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1-x));

    return R * c;
}

// ================= CLEAR =================

function clearAll() {

    if (routeLine) {
        map.removeLayer(routeLine);
        routeLine = null;
    }

    if (userMarker) {
        map.removeLayer(userMarker);
        userMarker = null;
    }

    if (watchId) {
        navigator.geolocation.clearWatch(watchId);
        watchId = null;
    }

    lastPosition = null;
    totalDistance = 0;

    document.getElementById("stats").innerHTML =
        "Speed: 0 mph<br>Distance: 0 m";
}

</script>

</body>
</html>
